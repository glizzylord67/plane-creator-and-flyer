<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviasali Modular Builder</title>
    <style>
        body {
            margin: 0; background: #1a1a24; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        #ui-bar {
            width: 900px; margin-top: 10px; display: flex;
            justify-content: space-between; align-items: center; background: #2a2a3a;
            padding: 10px 20px; border-radius: 8px; box-sizing: border-box;
        }
        .btn {
            padding: 10px 20px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 5px; color: white; background: #3a3aff;
        }
        .btn:hover { background: #1a1aff; }
        #fly-btn { background: #28a745; }
        #fly-btn:hover { background: #218838; }
        #workshop-layout { display: flex; gap: 15px; margin-top: 10px; }
        #parts-picker {
            width: 180px; background: #2a2a3a; border-radius: 8px;
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .part-item {
            padding: 10px; background: #3a3a4a; border: 2px solid #555;
            border-radius: 6px; cursor: pointer; text-align: center; font-size: 13px;
        }
        .part-item.active { border-color: #00ffcc; background: #2e4a45; }
        canvas {
            border: 2px solid #3a3a4a; background: #111116;
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        #stats { font-size: 14px; color: #aaa; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div id="stats">
            <strong>Aircraft Stats:</strong><br>
            Weight: <span id="stat-weight">0</span>kg | Lift: <span id="stat-lift">0</span> | Thrust: <span id="stat-thrust">0</span>
        </div>
        <div>
            <button id="clear-btn" class="btn" style="background:#dc3545;">Reset Assembly</button>
            <button id="fly-btn" class="btn">🚀 Take Off</button>
        </div>
    </div>

    <div id="workshop-layout">
        <div id="parts-picker">
            <h3 style="margin:0 0 10px 0; font-size:16px; text-align:center;">Parts Hangar</h3>
            <div class="part-item active" data-type="cockpit">🔴 Cockpit (Core)</div>
            <div class="part-item" data-type="wing">📐 Aerodynamic Wing</div>
            <div class="part-item" data-type="engine">🔥 Jet Engine</div>
            <div class="part-item" data-type="tank">🔋 Fuel Tank</div>
            <div style="font-size:11px; color:#888; text-align:center; margin-top:10px;">
                Select a component, then click the grid to install!
            </div>
        </div>
        <canvas id="gameCanvas" width="720" height="480"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game Core States: 'WORKSHOP' or 'FLIGHT'
let mode = 'WORKSHOP';
let activePartType = 'cockpit';

// Grid Assembly Properties
const GRID_SIZE = 30;
const COLS = canvas.width / GRID_SIZE;
const ROWS = canvas.height / GRID_SIZE;
const CENTER_X = Math.floor(COLS / 2);
const CENTER_Y = Math.floor(ROWS / 2);

// Inventory Defs
const PART_DEFS = {
    cockpit: { color: "#ff4757", name: "Core", weight: 50, lift: 2, thrust: 5, fuel: 100 },
    wing:    { color: "#1e90ff", name: "Wing", weight: 15, lift: 25, thrust: 0, fuel: 0 },
    engine:  { color: "#ffa500", name: "Jet",  weight: 40, lift: 2,  thrust: 45, fuel: 0 },
    tank:    { color: "#2ed573", name: "Fuel", weight: 60, lift: 0,  thrust: 0, fuel: 250 }
};

// Player's Custom Plane Grid Map
let gridMap = {};
// Pre-install a baseline cockpit at grid center
gridMap[`${CENTER_X},${CENTER_Y}`] = 'cockpit';

// Flight Engine Dynamics
let flight = {
    x: 100, y: 300, vx: 0, vy: 0, angle: 0,
    totalWeight: 0, totalLift: 0, totalThrust: 0, maxFuel: 0, currentFuel: 0,
    distance: 0, cargoCollected: 0
};

// Map Obstacles & Objectives
let items = [];

// --- UI AND INPUT HANDLERS ---
document.querySelectorAll('.part-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.part-item').forEach(p => p.classList.remove('active'));
        item.classList.add('active');
        activePartType = item.getAttribute('data-type');
    });
});

canvas.addEventListener('click', (e) => {
    if (mode !== 'WORKSHOP') return;
    const rect = canvas.getBoundingClientRect();
    const gX = Math.floor((e.clientX - rect.left) / GRID_SIZE);
    const gY = Math.floor((e.clientY - rect.top) / GRID_SIZE);
    
    const key = `${gX},${gY}`;
    if (gridMap[key]) {
        // If clicking an existing component that isn't the core node, erase it
        if (key !== `${CENTER_X},${CENTER_Y}`) delete gridMap[key];
    } else {
        // Block placing multiple core cockpits
        if (activePartType === 'cockpit') return;
        gridMap[key] = activePartType;
    }
    recalculateStats();
});

document.getElementById('clear-btn').addEventListener('click', () => {
    if (mode !== 'WORKSHOP') return;
    gridMap = {};
    gridMap[`${CENTER_X},${CENTER_Y}`] = 'cockpit';
    recalculateStats();
});

document.getElementById('fly-btn').addEventListener('click', () => {
    if (mode === 'WORKSHOP') {
        mode = 'FLIGHT';
        document.getElementById('fly-btn').innerText = "🛠 Return to Hangar";
        document.getElementById('fly-btn').style.background = "#ffa500";
        initFlight();
    } else {
        mode = 'WORKSHOP';
        document.getElementById('fly-btn').innerText = "🚀 Take Off";
        document.getElementById('fly-btn').style.background = "#28a745";
    }
});

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// --- PHYSICS & VALUE GENERATORS ---
function recalculateStats() {
    let w = 0, l = 0, t = 0, f = 0;
    for (let cell in gridMap) {
        let p = PART_DEFS[gridMap[cell]];
        w += p.weight; l += p.lift; t += p.thrust; f += p.fuel;
    }
    document.getElementById('stat-weight').innerText = w;
    document.getElementById('stat-lift').innerText = l;
    document.getElementById('stat-thrust').innerText = t;
    
    flight.totalWeight = w;
    flight.totalLift = l;
    flight.totalThrust = t;
    flight.maxFuel = f;
}

function initFlight() {
    recalculateStats();
    flight.x = 150; flight.y = 250;
    flight.vx = 2; flight.vy = 0; flight.angle = 0;
    flight.currentFuel = flight.maxFuel;
    flight.distance = 0;
    flight.cargoCollected = 0;

    // Generate random cargo payload loops and atmospheric hazards
    items = [];
    for(let i = 0; i < 20; i++) {
        items.push({
            x: 400 + i * 350 + Math.random() * 100,
            y: 100 + Math.random() * 250,
            type: Math.random() > 0.4 ? 'cargo' : 'hazard',
            collected: false
        });
    }
}

// --- RENDERING ROUTINES ---
function drawGridPart(type, x, y, size) {
    ctx.fillStyle = PART_DEFS[type].color;
    ctx.fillRect(x, y, size - 2, size - 2);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, size - 2, size - 2);
}

function renderPlane() {
    // Determine bounds to center custom craft frame
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (let key in gridMap) {
        let [cx, cy] = key.split(',').map(Number);
        if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
        if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
    }
    let offsetX = ((maxX - minX + 1) * GRID_SIZE) / 2;
    let offsetY = ((maxY - minY + 1) * GRID_SIZE) / 2;

    for (let key in gridMap) {
        let [cx, cy] = key.split(',').map(Number);
        let drawX = (cx - minX) * GRID_SIZE - offsetX;
        let drawY = (cy - minY) * GRID_SIZE - offsetY;
        drawGridPart(gridMap[key], drawX, drawY, GRID_SIZE);
    }
}

// --- MAIN CORE MODULE LOOP ---
function step() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (mode === 'WORKSHOP') {
        // Render Editor Placement Blueprint Grid Maps
        ctx.strokeStyle = "#252535"; ctx.lineWidth = 1;
        for (let i = 0; i <= COLS; i++) { ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke(); }
        for (let j = 0; j <= ROWS; j++) { ctx.beginPath(); ctx.moveTo(0, j * GRID_SIZE); ctx.lineTo(canvas.width, j * GRID_SIZE); ctx.stroke(); }

        // Render current modular build
        for (let key in gridMap) {
            let [gx, gy] = key.split(',').map(Number);
            drawGridPart(gridMap[key], gx * GRID_SIZE, gy * GRID_SIZE, GRID_SIZE);
        }
        
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "14px sans-serif";
        ctx.fillText("🔧 WORKSHOP: Click to attach/detach components", 20, 30);

    } else if (mode === 'FLIGHT') {
        // Aerodynamic Flight Engine Calculations
        if (keys['w'] || keys['arrowup']) flight.angle -= 0.04;
        if (keys['s'] || keys['arrowdown']) flight.angle += 0.04;

        // Thrust vector translation with functional fuel deductions
        if (flight.currentFuel > 0) {
            let force = flight.totalThrust * 0.003;
            flight.vx += Math.cos(flight.angle) * force;
            flight.vy += Math.sin(flight.angle) * force;
            flight.currentFuel -= 0.2 + (flight.totalThrust * 0.005);
        }

        // Lift & Weight Balancing Equations
        let speed = Math.sqrt(flight.vx * flight.vx + flight.vy * flight.vy);
        let liftAmount = speed * (flight.totalLift * 0.01) * Math.cos(flight.angle);
        flight.vy -= liftAmount * 0.05;
        flight.vy += (flight.totalWeight * 0.0015); // Gravity impact

        // Apply environmental drag dampening
        flight.vx *= 0.985; flight.vy *= 0.985;

        // Translate coordinate positions
        flight.y += flight.vy;
        flight.distance += flight.vx * 0.1;

        // Canvas Boundary constraints
        if (flight.y > canvas.height - 40) { flight.y = canvas.height - 40; flight.vy = 0; flight.vx *= 0.95; }
        if (flight.y < 20) { flight.y = 20; flight.vy = 0; }

        // Draw Infinite Background Floor & Sky Indicators
        ctx.fillStyle = "#1e1e2a"; ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
        
        // Dynamic HUD HUD Displays
        ctx.fillStyle = "#fff"; ctx.font = "bold 13px sans-serif";
        ctx.fillText(`Distance: ${Math.floor(flight.distance)}m`, 20, 35);
        ctx.fillText(`Cargo Picked Up: ${flight.cargoCollected}`, 20, 55);
        
        // Draw Core Fuel Indicator Gauge 
        let fuelPct = Math.max(0, flight.currentFuel / flight.maxFuel);
        ctx.fillStyle = "#333"; ctx.fillRect(20, 70, 150, 12);
        ctx.fillStyle = fuelPct > 0.3 ? "#2ed573" : "#ff4757";
        ctx.fillRect(20, 70, 150 * fuelPct, 12);
        ctx.fillStyle = "#fff"; ctx.font = "10px sans-serif";
        ctx.fillText("FUEL", 25, 80);

        // Process Interactive Map Objects
        items.forEach(item => {
            let relativeX = item.x - (flight.distance * 10);
            if (relativeX > -50 && relativeX < canvas.width + 50 && !item.collected) {
                ctx.fillStyle = item.type === 'cargo' ? "#eccc68" : "#ff6b81";
                ctx.beginPath();
                ctx.arc(relativeX, item.y, item.type === 'cargo' ? 10 : 12, 0, Math.PI * 2);
                ctx.fill();

                // Simple collision detection bounds
                let distToPlane = Math.hypot(relativeX - flight.x, item.y - flight.y);
                if (distToPlane < 25) {
                    item.collected = true;
                    if (item.type === 'cargo') {
                        flight.cargoCollected++;
                    } else {
                        // Crash impact penality adjustments
                        flight.vx *= 0.4;
                        flight.vy += 4;
                    }
                }
            }
        });

        // Save layout context, render custom plane grid relative to direction vectors
        ctx.save();
        ctx.translate(flight.x, flight.y);
        ctx.rotate(flight.angle);
        renderPlane();
        ctx.restore();
    }

    requestAnimationFrame(step);
}

// Boot setup script configurations
recalculateStats();
step();
</script>

</body>
</html>
